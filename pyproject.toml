[project]
name = "biomechpose"
version = "0.2.0"
description = "Pose estimation guided by a biomechanical model."
authors = [
    {name = "Sibo Wang",email = "sibo.wang@epfl.ch"}
]
readme = "README.md"
requires-python = "3.12.*"
dependencies = [
    "numpy>=2.0,<3",
    "jupyter>=1.1,<2",
    "matplotlib>=3.10,<4",
    "torch>=2.7,<3",
    "torchvision==0.22.1",
    "tensorboard>=2.19,<3",
    "pillow>=11.3,<12",
    # "imageio>=2.37,<3",
    "tqdm>=4.67,<5",
    "pandas>=2.3,<3",
    # "flygym",
    # "av",
    # "scikit-image==0.25.2",
    # "joblib>=1.5,<2",
    # "dominate",
    # "visdom",
    "tyro==0.9.24",
    "wandb==0.20.1",
    # "PyYAML>=6.0,<7",
]

[tool.poetry]
packages = [{include = "biomechpose", from = "src"}]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
